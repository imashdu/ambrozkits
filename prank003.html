<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神祕塔羅占卜</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: #e9e9e9; text-align: center; padding: 20px; }
        .card-container { margin: 30px auto; width: 200px; height: 350px; perspective: 1000px; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.8s; transform-style: preserve-3d; cursor: pointer; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; border: 2px solid #c9a227; }
        .card-back { background: #0f3460; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .card-front { background: white; color: #1a1a2e; transform: rotateY(180deg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        
        #result-section { display: none; margin-top: 20px; }
        .blur-text { filter: blur(5px); user-select: none; background: #333; padding: 10px; border-radius: 5px; }
        .pay-overlay { margin-top: -50px; position: relative; z-index: 10; }
        
        button { background-color: #e94560; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #ff2e63; }
        .payment-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #16213e; padding: 30px; border: 2px solid #c9a227; border-radius: 10px; z-index: 100; }
    </style>
</head>
<body>

    <h1>✨ 命運塔羅占卜 ✨</h1>
    <p>閉上眼，靜下心，點擊下方牌背抽牌...</p>

    <div class="card-container" onclick="drawCard()">
        <div class="card" id="tarot-card">
            <div class="card-face card-back">🔮</div>
            <div class="card-face card-front" id="card-content">
                <h2 id="card-name">牌名</h2>
                <div id="card-img" style="font-size: 60px;">🃏</div>
            </div>
        </div>
    </div>

    <div id="result-section">
        <h3>【 抽牌結果 】</h3>
        <p id="short-desc">這張牌代表著你目前的能量狀態...</p>
        
        <hr>
        
        <h3>【 深度詳解 】</h3>
        <div class="blur-text">
            這是一段非常深刻的解說，關於你的過去、現在與未來。你即將面臨的轉機就在...（此處已被隱藏）
            這是一段非常深刻的解說，關於你的過去、現在與未來。你即將面臨的轉機就在...（此處已被隱藏）
        </div>
        
        <div class="pay-overlay">
            <button onclick="showPayment()">🔓 支付 NT$ 99 解鎖完整分析</button>
        </div>
    </div>

    <div class="payment-modal" id="payModal">
        <h2>確認支付</h2>
        <p>解鎖這張牌的深度專屬解說</p>
        <p>請選擇支付方式：Line Pay / 信用卡</p>
        <button onclick="alert('跳轉金流介面中...')">前往付款</button>
        <button style="background:#555" onclick="closePayment()">取消</button>
    </div>

    <script>
        const cards = [
            { name: "愚者", icon: "0️⃣", desc: "象徵新的開始與冒險。" },
            { name: "魔術師", icon: "🪄", desc: "象徵創造力與掌握資源。" },
            { name: "女祭司", icon: "🌙", desc: "象徵直覺與內在智慧。" },
            { name: "戀人", icon: "❤️", desc: "象徵選擇與情感連結。" }
        ];

        function drawCard() {
            const cardElement = document.getElementById('tarot-card');
            if (cardElement.classList.contains('is-flipped')) return;

            const randomCard = cards[Math.floor(Math.random() * cards.length)];
            document.getElementById('card-name').innerText = randomCard.name;
            document.getElementById('card-img').innerText = randomCard.icon;
            document.getElementById('short-desc').innerText = "你抽到了「" + randomCard.name + "」，" + randomCard.desc;

            cardElement.classList.add('is-flipped');
            
            setTimeout(() => {
                document.getElementById('result-section').style.display = 'block';
            }, 800);
        }

        function showPayment() {
            document.getElementById('payModal').style.display = 'block';
        }

        function closePayment() {
            document.getElementById('payModal').style.display = 'none';
        }
    </script>
</body>
</html>
